# code-server config
# Install: mkdir -p ~/.config/code-server && cp config.yaml ~/.config/code-server/config.yaml
#
# Auth is "none" because access is gated by Cloudflare tunnel / Tailscale.
# If exposing directly to the internet, change auth to "password" and set a password.

bind-addr: 127.0.0.1:8443
auth: none
cert: false
