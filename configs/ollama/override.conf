# Ollama systemd overrides for DGX Spark (GB10, 128GB unified memory)
#
# Install: sudo mkdir -p /etc/systemd/system/ollama.service.d
#          sudo cp override.conf /etc/systemd/system/ollama.service.d/override.conf
#          sudo systemctl daemon-reload && sudo systemctl restart ollama

[Service]
# Listen on all interfaces (needed for nginx proxy)
Environment="OLLAMA_HOST=0.0.0.0:11434"

# Use all available VRAM (128GB unified memory on GB10)
Environment="OLLAMA_GPU_OVERHEAD=0"

# Keep models loaded longer (30min) — plenty of memory
Environment="OLLAMA_KEEP_ALIVE=30m"

# Allow parallel requests
Environment="OLLAMA_NUM_PARALLEL=8"

# Max loaded models — with 128GB unified mem, can keep several loaded
Environment="OLLAMA_MAX_LOADED_MODELS=3"

# Flash Attention
Environment="OLLAMA_FLASH_ATTENTION=1"

# Use all CPU cores for prompt processing
Environment="OLLAMA_NUM_THREADS=10"

# KV cache quantization — saves memory for large contexts
Environment="OLLAMA_KV_CACHE_TYPE=q8_0"
