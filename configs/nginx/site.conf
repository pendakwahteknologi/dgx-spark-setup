# Nginx reverse proxy for DGX Spark
# Replace {{HOSTNAME}} and {{DOMAIN}} before installing
#
# Install: sudo cp site.conf /etc/nginx/sites-available/{{HOSTNAME}}.conf
#          sudo ln -s /etc/nginx/sites-available/{{HOSTNAME}}.conf /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

# All services on {{HOSTNAME}}.{{DOMAIN}}
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name {{HOSTNAME}}.{{DOMAIN}};

    # Dashboard
    location / {
        root /var/www/{{HOSTNAME}}-main;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # System Manager API
    location /{{HOSTNAME}}-api/ {
        proxy_pass http://127.0.0.1:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    # code-server (VS Code in browser)
    location /code/ {
        proxy_pass http://127.0.0.1:8443/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Ollama API
    location /ollama/ {
        proxy_pass http://127.0.0.1:11434/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ComfyUI
    location /comfyui/ {
        proxy_pass http://127.0.0.1:8188/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 500M;
    }

    # Benchmark reports (add as needed)
    # location /benchmarks/01/ {
    #     alias /home/{{USER}}/ai/benchmarks/01-inference-model-scaling/;
    #     autoindex on;
    # }
}
